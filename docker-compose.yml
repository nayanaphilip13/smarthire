

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smarthire_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - smarthire_network
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: smarthire_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - smarthire_network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: smarthire_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: smarthire
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: secret
      MYSQL_USER: smarthire
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - smarthire_network

  redis:
    image: redis:alpine
    container_name: smarthire_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - smarthire_network

networks:
  smarthire_network:
    driver: bridge

volumes:
  mysql_data: